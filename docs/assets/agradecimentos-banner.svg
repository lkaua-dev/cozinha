<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Agradecimentos do Projeto Cozinha</title>
  <desc id="desc">Banner decorativo com Saga SENAI, Kantine Gastronomia e Equipe TecnoByte.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b2a1a"/>
      <stop offset="0.46" stop-color="#7f3f28"/>
      <stop offset="1" stop-color="#2f5f4a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8ee" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#f7ddc8" stop-opacity="0.94"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#23140e" flood-opacity="0.32"/>
    </filter>
    <pattern id="lines" width="36" height="36" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="36" height="36" fill="none"/>
      <path d="M 0 18 H 36" stroke="#fff8ee" stroke-opacity="0.10" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="34" fill="url(#lines)"/>
  <path d="M0 274 C160 220 265 321 432 271 C588 224 665 140 842 181 C990 216 1058 293 1200 239 L1200 360 L0 360 Z" fill="#fff8ee" opacity="0.10"/>
  <path d="M0 72 C164 114 265 29 428 83 C571 130 705 110 830 71 C986 23 1084 56 1200 105 L1200 0 L0 0 Z" fill="#f5c26b" opacity="0.12"/>

  <g filter="url(#shadow)">
    <rect x="90" y="58" width="1020" height="244" rx="28" fill="url(#card)"/>
    <rect x="112" y="80" width="976" height="200" rx="22" fill="none" stroke="#c8603a" stroke-opacity="0.28" stroke-width="2"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="600" y="128" fill="#5b2d1d" font-size="24" font-weight="700">Saga SENAI - Demanda real da Kantine Gastronomia</text>
    <text x="600" y="186" fill="#2f241b" font-size="58" font-weight="800">Agradecimentos</text>
    <text x="600" y="232" fill="#5c7a4e" font-size="28" font-weight="700">Equipe TecnoByte</text>
    <text x="600" y="264" fill="#7f5a43" font-size="20" font-weight="600">TCC - Desenvolvimento de Sistemas - Codigo aberto para evolucao</text>
  </g>

  <g fill="none" stroke-linecap="round" stroke-width="5" opacity="0.45">
    <path d="M178 132 h82" stroke="#c8603a"/>
    <path d="M940 132 h82" stroke="#5c7a4e"/>
    <path d="M178 236 h64" stroke="#5c7a4e"/>
    <path d="M958 236 h64" stroke="#c8603a"/>
  </g>
</svg>
