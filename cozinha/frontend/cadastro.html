<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro — AuthSystem</title>
  <link rel="stylesheet" href="/cozinha/frontend/css/style_geral.css" />
</head>

<body data-page="cadastro">

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-icon">🔐</div>
        <span class="auth-logo-text">AuthSystem</span>
      </div>

      <!-- Título -->
      <h1 class="auth-title">Criar conta</h1>
      <p class="auth-subtitle">Preencha os dados abaixo para se cadastrar no sistema.</p>

      <!-- Alerta global -->
      <div id="alertGlobal" class="auth-alert" role="alert" aria-live="polite"></div>

      <!-- Formulário de cadastro -->
      <form id="formCadastro" novalidate autocomplete="off">

        <!-- Nome -->
        <div class="form-group">
          <label class="form-label" for="nome">Nome completo</label>
          <input
            id="nome"
            type="text"
            class="form-input"
            placeholder="Seu nome"
            autocomplete="name"
            aria-describedby="nomeError"
          />
          <span id="nomeError" class="field-error" role="alert"></span>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input
            id="email"
            type="email"
            class="form-input"
            placeholder="seu@email.com"
            autocomplete="email"
            aria-describedby="emailError"
          />
          <span id="emailError" class="field-error" role="alert"></span>
        </div>

        <!-- Senha -->
        <div class="form-group">
          <label class="form-label" for="senha">Senha</label>
          <div class="password-wrapper">
            <input
              id="senha"
              type="password"
              class="form-input"
              placeholder="Mínimo 6 caracteres"
              autocomplete="new-password"
              aria-describedby="senhaError"
            />
            <button type="button" class="password-toggle" aria-label="Mostrar senha" data-target="senha">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M1 12C1 12 5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.8"/>
              </svg>
            </button>
          </div>
          <span id="senhaError" class="field-error" role="alert"></span>

          <!-- Barra de força da senha -->
          <div id="strengthContainer" class="password-strength">
            <div class="strength-bar-track">
              <div id="strengthFill" class="strength-bar-fill"></div>
            </div>
            <span id="strengthLabel" class="strength-label"></span>
          </div>
        </div>

        <!-- Confirmar senha -->
        <div class="form-group">
          <label class="form-label" for="confirmarSenha">Confirmar senha</label>
          <div class="password-wrapper">
            <input
              id="confirmarSenha"
              type="password"
              class="form-input"
              placeholder="Repita a senha"
              autocomplete="new-password"
              aria-describedby="confirmarSenhaError"
            />
            <button type="button" class="password-toggle" aria-label="Mostrar senha" data-target="confirmarSenha">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M1 12C1 12 5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.8"/>
              </svg>
            </button>
          </div>
          <span id="confirmarSenhaError" class="field-error" role="alert"></span>
        </div>

        <!-- Botão cadastrar -->
        <button id="btnCadastrar" type="submit" class="btn-primary">
          Criar conta
        </button>

      </form>

      <!-- Link para login -->
      <div class="auth-links-center">
        Já tem uma conta?
        <a href="/cozinha/frontend/login.html">Fazer login</a>
      </div>

    </div>
  </div>

  <script src="/cozinha/frontend/js/login_geral.js"></script>
</body>
</html>
