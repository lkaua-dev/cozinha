<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — AuthSystem</title>
  <link rel="stylesheet" href="/cozinha/frontend/css/style_geral.css" />
</head>

<!-- data-page identifica qual lógica o JS deve inicializar -->
<body data-page="login">

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-icon">🔐</div>
        <span class="auth-logo-text">AuthSystem</span>
      </div>

      <!-- Título -->
      <h1 class="auth-title">Bem-vindo de volta</h1>
      <p class="auth-subtitle">Entre com suas credenciais para acessar o sistema.</p>

      <!-- Alerta global -->
      <div id="alertGlobal" class="auth-alert" role="alert" aria-live="polite"></div>

      <!-- Formulário de login -->
      <form id="formLogin" novalidate autocomplete="off">

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input
            id="email"
            type="email"
            class="form-input"
            placeholder="seu@email.com"
            autocomplete="email"
            aria-describedby="emailError"
          />
          <span id="emailError" class="field-error" role="alert"></span>
        </div>

        <!-- Senha -->
        <div class="form-group">
          <label class="form-label" for="senha">Senha</label>
          <div class="password-wrapper">
            <input
              id="senha"
              type="password"
              class="form-input"
              placeholder="Mínimo 6 caracteres"
              autocomplete="current-password"
              aria-describedby="senhaError"
            />
            <button type="button" class="password-toggle" aria-label="Mostrar senha" data-target="senha">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M1 12C1 12 5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.8"/>
              </svg>
            </button>
          </div>
          <span id="senhaError" class="field-error" role="alert"></span>
        </div>

        <!-- Botão entrar -->
        <button id="btnEntrar" type="submit" class="btn-primary">
          Entrar
        </button>

      </form>

      <!-- Links de navegação -->
      <div class="auth-links">
        <a href="/cozinha/frontend/recuperar.html" class="auth-link">Esqueci minha senha</a>
        <a href="/cozinha/frontend/cadastro.html" class="auth-link">Criar conta</a>
      </div>

    </div>
  </div>

  <script src="/cozinha/frontend/js/login_geral.js"></script>
</body>
</html>
